version: "3.9"

services:
  # Reverse proxy + SPA file server
  caddy:
    image: lucaslorentz/caddy-docker-proxy:ci-alpine
    container_name: loar-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - caddy_data:/data
      - ./apps/web/dist:/srv:ro          # <-- Mount SPA files directly into Caddy
    restart: unless-stopped
    networks:
      - loar-network
    labels:
      # Domain
      caddy: loartech.xyz
        # Reverse proxy for backend first
      caddy.0_route: /trpc/*
      caddy.0_route.reverse_proxy: "{{upstreams 3000}}"
      caddy.1_route: /api/*
      caddy.1_route.reverse_proxy: "{{upstreams 3000}}"

      # SPA file server last
      caddy.root: "/srv"
      caddy.file_server: ""
      caddy.try_files: "{path} /index.html"

      # CORS headers
      caddy.header.Access-Control-Allow-Origin: "*"
      caddy.header.Access-Control-Allow-Methods: "GET, POST, OPTIONS"
      caddy.header.Access-Control-Allow-Headers: "*"


  # Backend API
  app-server:
    image: oven/bun:1.1.8-alpine
    container_name: loar-server
    working_dir: /app
    volumes:
      - .:/app
    env_file:
      - ./apps/server/.env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/loar-fullstack
      - CORS_ORIGIN=https://loartech.xyz
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-defaultsecret}
      - BETTER_AUTH_URL=https://loartech.xyz
    command: ["sh", "-c", "apk add --no-cache curl && bun run apps/server/dist/index.js"]
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - loar-network

  # Database
  postgres:
    image: postgres:15
    container_name: loar-postgres
    environment:
      POSTGRES_DB: loar-fullstack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - loar-network

volumes:
  postgres_data:
  caddy_data:

networks:
  loar-network:
    driver: bridge

